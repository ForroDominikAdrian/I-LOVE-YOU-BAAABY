<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 Évforduló</title>
    <style>
        /* Alapvető beállítások és sötét, romantikus háttér */
        body {
            margin: 0;
            padding: 0;
            background-color: #1a0b1c; /* Mély, sötét romantikus szín */
            color: #ffebf0; /* Halvány, elegáns rózsaszínes betűszín */
            font-family: 'Segoe UI', Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; 
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Az áttetsző kártya, amiben a szöveg van */
        .container {
            z-index: 10;
            max-width: 90%;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 192, 203, 0.2);
            /* Kezdetben láthatatlan, hogy ne zavarja a szív-burstöt */
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 1s ease 1s, transform 1s ease 1s; /* Késleltetett megjelenés */
        }

        /* Amikor a konténer láthatóvá válik */
        .container.visible {
            opacity: 1;
            transform: scale(1);
        }

        /* A szöveg sorok animációhoz előkészítve */
        .text-line {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 20px;
            opacity: 0; /* Kezdetben láthatatlan */
            transform: translateY(20px); /* Kicsit lejjebbről indul */
            transition: opacity 1.5s ease, transform 1.5s ease;
        }

        /* Ezt az osztályt adja hozzá a JS a beúszáshoz */
        .text-line.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Dobogó szív effektus a szöveg végén */
        .heart-text {
            color: #ff4d6d;
            font-size: 1.5rem;
            display: inline-block;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        /* Lebegő háttér-szívek stílusa */
        .floating-heart {
            position: absolute;
            color: #ff4d6d;
            opacity: 0.6;
            animation: floatUp linear infinite;
            z-index: 1;
            user-select: none;
            pointer-events: none; /* Ne lehessen rákattintani */
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            20% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-10vh) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div id="hearts-container"></div>

    <div class="container" id="main-container">
        <p class="text-line" id="line1">Ez az egy év csodálatos volt.</p>
        <p class="text-line" id="line2">Minden egyes percét élveztem.</p>
        <p class="text-line" id="line3">De akkor voltam a legboldogabb, amikor realizáltam hogy barátnőmnek hívhatlak, vagy éppen baby bogyómnak, picimnek, piximnek, kincsemnek, mikor minek <span class="heart-text">❤️</span></p>
    </div>

    <script>
        // A szív létrehozó függvény (megmaradt)
        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = '❤️';
            
            // Véletlenszerű elhelyezkedés, méret és sebesség
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 1.5 + 0.5) + 'rem';
            heart.style.animationDuration = (Math.random() * 4 + 3) + 's'; // 3-7 másodperc alatt ér fel
            
            document.getElementById('hearts-container').appendChild(heart);
            
            // Szív eltávolítása, miután felért, hogy ne terhelje a telefont
            setTimeout(() => {
                heart.remove();
            }, 7000);
        }

        // ÚJ: Kezdeti szív "eső" (burst) effektus
        function startHeartBurst() {
            const burstDuration = 2000; // 2 másodpercig tart a burst
            const heartInterval = 50; // 50ms-onként egy új szív (nagyon gyors)
            
            // Elindítja a gyors generálást
            const burstId = setInterval(createFloatingHeart, heartInterval);
            
            // Leállítja a generálást a megadott idő után
            setTimeout(() => {
                clearInterval(burstId);
            }, burstDuration);
        }

        // --- Időzítések ---

        // 1. Az oldal betöltésekor azonnal indul a szív burst
        window.addEventListener('load', startHeartBurst);

        // 2. A konténer kártya megjelenítése a burst után
        setTimeout(() => {
            document.getElementById('main-container').classList.add('visible');
        }, 1500); // 1,5 mp múlva, miközben a szívek még mennek

        // 3. Szövegek késleltetett, gyönyörű beúszása (a meglévő időzítésekhez igazítva)
        setTimeout(() => { document.getElementById('line1').classList.add('visible'); }, 2500);  
        setTimeout(() => { document.getElementById('line2').classList.add('visible'); }, 4500);  
        setTimeout(() => { document.getElementById('line3').classList.add('visible'); }, 7000);  

        // Nincs folyamatos szív generálás a szöveg mellett, csak a kezdeti burst.
    </script>
</body>
</html>
